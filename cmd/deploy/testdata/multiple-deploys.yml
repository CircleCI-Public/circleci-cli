version: 2.1

jobs:
  build:
    docker:
      - image: cimg/base:current
    steps:
      - checkout

  deploy-staging:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run: ./deploy-staging.sh

  deploy-prod:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run: ./deploy-prod.sh

  release-docs:
    docker:
      - image: cimg/base:current
    steps:
      - run: ./publish-docs.sh
