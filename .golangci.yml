# Lint rollout policy (Phase 2):
# - New linters are added in warning mode first (severity: warning)
# - errorlint is the only hard-enforced new linter (validates pkg/errors migration)
# - Linters are promoted to error severity after fixing all existing violations
---
service:
  golangci-lint-version: 1.63.x

linters:
  enable:
    - errcheck
    - goconst
    - gofmt
    - goimports
    # - gosec
    - gosimple
    - govet
    - ineffassign
    - misspell
    - nakedret
    # - revive
    - staticcheck
    - typecheck
    - unconvert
    # - unparam
    - unused
    - govet

# Instead of disabling tests entirely, just ignore goconst, which is the only
# one with issues there currently.
issues:
  exclude-rules:
    - path: (.+)_test.go
      linters:
        - goconst
