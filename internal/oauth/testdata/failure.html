<!doctype html>
<html lang="en">
<head>

    <title>Authorization failed — CircleCI CLI</title>

        body {
            margin: 0;
            min-height: 100vh;

            border-radius: 0.875rem;
            padding: 2.5rem 2.5rem 2rem;
            max-width: 22rem;
            width: 100%;
            text-align: center;
        }

        .checkmark {
            margin-bottom: 1rem;
        }

        .checkmark svg {
            width: 2.25rem;
            height: 2.25rem;
        }

        h1 {
            font-size: 1.125rem;
            font-weight: 700;
            color: #ffffff;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.01em;
        }

        p {
            font-size: 0.875rem;
            color: #7b8db5;
            margin: 0;
            line-height: 1.5;
        }
