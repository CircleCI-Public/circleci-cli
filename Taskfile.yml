version: "3"

vars:
  RESULTS_DIR: test-reports
  TEST_REPORT: test-reports/tests.xml
  LINT_REPORT: test-reports/lint.xml

tasks:
  lint:
    desc: Lint code
    cmds:
      - go tool golangci-lint run -c .golangci.yml {{.CLI_ARGS}}
    summary: Lint the project with golangci-lint

  clean:
    desc: Cleans out the build, out, docs, and dist directories
    cmds:
      - GO111MODULE=off go clean -i
      - rm -rf build out docs dist test-reports

  fmt:
    desc: Run `go fmt` and `gosimports` to format the code
    cmds:
      - go fmt ./...
      - go tool gosimports -local "$(go list -m)" -w .

  test:
    desc: Run the tests with race detector
    env:
      CGO_ENABLED: 1
    cmds:
      - go tool gotestsum -- -race -count=1 ./...

  tidy:
    desc: Run 'go mod tidy' to clean up module files.
    cmds:
      - go mod tidy -v

  doc:
    desc: run's the godocs
    cmds:
      - godoc -http=:6060

  gen-docs:
    desc: Generate CLI usage documentation
    cmds:
      - go run main.go usage

  check-go-mod:
    desc: Check go.mod is tidy
    cmds:
      - go mod tidy -v
      - git diff --exit-code -- go.mod go.sum

  vendor:
    desc: go mod vendor
    cmds:
      - go mod vendor

  mod-download:
    desc: Download go module dependencies
    cmds:
      - go mod download

  build:
    desc: Build main
    cmds:
      # LDFlags sets the segment endpoint to an empty string thus letting the analytics library set the default endpoint on its own
      # Not setting the `SegmentEndpoint` variable would let the value in the code ie "http://localhost"
      - go build -v -o build/$(go env GOOS)/$(go env GOARCH)/circleci -ldflags='-X github.com/CircleCI-Public/circleci-cli/telemetry.SegmentEndpoint=https://api.segment.io' .

  build-linux:
    desc: Build main for Linux
    cmds:
      - go build -v -o build/linux/amd64/circleci .

  cover:
    desc: Run tests and generate a coverage profile
    env:
      CGO_ENABLED: 1
    cmds:
      - go test -race -coverprofile=coverage.txt ./...

  ci:diff:
    desc: Ensure no uncommitted changes after code generation, formatting, and tidying
    cmds:
      - task: fmt
      - task: tidy
      - git diff --exit-code

  ci:lint:
    desc: Run golangci-lint with JUnit output for CI
    cmds:
      - mkdir -p "{{.RESULTS_DIR}}"
      - go tool golangci-lint run -c .golangci.yml --output.junit-xml.path "{{.LINT_REPORT}}"

  ci:test:
    desc: Run tests with race detector and JUnit output for CI
    env:
      CGO_ENABLED: 1
    cmds:
      - mkdir -p "{{.RESULTS_DIR}}"
      - go tool gotestsum --junitfile "{{.TEST_REPORT}}" -- -race -count=1 ./...

  ci:test:windows:
    desc: Run tests without race detector (Windows) with JUnit output for CI
    cmds:
      - mkdir -p "{{.RESULTS_DIR}}"
      - go tool gotestsum --junitfile "{{.TEST_REPORT}}" -- -count=1 ./...

  ci:coverage:
    desc: Run coverage and enforce 35% threshold
    cmds:
      - task: cover
      - go tool cover -func=coverage.txt | grep total | awk '{print $3}' | sed 's/%//' | awk '{if ($1+0 < 35) exit 1}'
