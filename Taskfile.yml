version: '3'

vars:
  RESULTS_DIR: test-reports
  TEST_REPORT: test-reports/tests.xml
  LINT_REPORT: test-reports/lint.xml

  # Hugo project lives in docs/website/; built output lands in docs/website/public.
  SITE_DIR: docs/website
  SITE_OUT: docs/website/public

  GH_NAME: 'circleci'
  GH_EMAIL: 'ops+deploy-bot@circleci.com'

tasks:
  build:
    desc: Build the circleci binary
    vars:
      DEST: '{{default "dist/circleci" .DEST}}'
      COMMIT:
        sh: git rev-parse --short HEAD 2>/dev/null || echo unknown
      DIRTY:
        sh: test -z "$(git status --porcelain 2>/dev/null)" || echo .dirty
      VERSION: '1.0.0-dev+{{.COMMIT}}{{.DIRTY}}'
    cmds:
      - go build -ldflags="-X main.version={{.VERSION}}" -o "{{.DEST}}" ./cmd/circleci

  release-check:
    desc: Check if the release is ready to be published
    cmds:
      - go tool -modfile tools/go.mod goreleaser check

  test:
    desc: Run unit tests
    vars:
      ARGS: '{{default "./..." .CLI_ARGS}}'
    cmds:
      - go tool -modfile tools/go.mod gotestsum -- -race {{.ARGS}}

  check:
    desc: Run all static checks
    cmds:
      - task: lint
      - task: license
        vars:
          CLI_ARGS: -check .
      - task: mod-tidy
        vars:
          CLI_ARGS: -diff
      - task: release-check

  fix:
    desc: Auto-fix static checks
    cmds:
      - task: fmt
      - task: license
      - task: mod-tidy
      - task: lint
        vars:
          CLI_ARGS: ./... --fix

  lint:
    desc: Run golangci-lint
    vars:
      ARGS: '{{default "./..." .CLI_ARGS}}'
    cmds:
      - go tool -modfile tools/go.mod golangci-lint run {{.ARGS}}

  fmt:
    desc: Format the code
    vars:
      ARGS: '{{default "./..." .CLI_ARGS}}'
    cmds:
      - go tool -modfile tools/go.mod golangci-lint fmt {{.ARGS}}

  license:
    desc: Manage license headers
    vars:
      ARGS: '{{default "." .CLI_ARGS}}'
    cmds:
      - |
        go tool -modfile tools/go.mod addlicense \
          -c "Circle Internet Services, Inc." \
          -l mit \
          -s \
          -ignore ".idea/**" \
          -ignore ".circleci/**" \
          -ignore ".claude/**" \
          -ignore ".git/**" \
          -ignore ".github/**" \
          -ignore "test-reports/**" \
          -ignore "**/*.html" \
          -ignore "acceptance/testdata/**" \
          -ignore "bin/**" \
          -ignore "dist/**" \
          -ignore "docs/website/content/**" \
          -ignore "docs/website/public/**" \
          {{.ARGS}}

  mod-tidy:
    desc: Run 'go mod tidy'
    vars:
      ARGS: '{{default "-v" .CLI_ARGS}}'
    cmds:
      - go mod tidy {{.ARGS}}
      - go -C tools mod tidy {{.ARGS}}

  mod-download:
    desc: Run 'go mod download'
    cmds:
      - go mod download
      - go mod download -modfile tools/go.mod

  acceptance-test:
    desc: Build binary and run acceptance tests
    vars:
      ARGS: '{{default "./acceptance/..." .CLI_ARGS}}'
    cmds:
      - go tool -modfile tools/go.mod gotestsum -- -race {{.ARGS}}

  dev-install:
    desc: Build from source and install to ~/.local/bin
    vars:
      DEST: '${HOME}/.local/bin'
    cmds:
      - mkdir -p "{{.DEST}}"
      - task: build
        vars:
          DEST: '{{.DEST}}/circleci'

  generate:
    desc: Run go generate
    cmds:
      - go generate ./...

  # Demo tasks
  #
  # Static PNG/SVG screenshots of the CLI in action are captured with
  # charmbracelet/freeze

  demo:
    desc: Generate all README/docs screenshots
    cmds:
      - task: demo:run-get-png

  demo:run-get-png:
    desc: Capture a macOS-style PNG and SVG of `circleci run get -b main`
    cmds:
      - for: ['svg']
        cmd: >-
          CIRCLE_NO_PAGER=1 CIRCLE_SPINNER_DISABLED=1
          go tool -modfile tools/go.mod freeze
          --config docs/demos/freeze.json
          --execute "go run ./cmd/circleci run get -b main"
          --execute.timeout 60s
          --output docs/demos/run-get.{{.ITEM}}


  docs:reference:
    desc: Generate the reference page from the live command tree
    cmds:
      - mkdir -p {{.SITE_DIR}}/content/reference {{.SITE_DIR}}/static/img
      # The landing page (/) is a hand-written template; the screenshot it shows
      # is the freeze-captured demo, copied into the site's static tree.
      - cp docs/demos/run-get.svg {{.SITE_DIR}}/static/img/run-get.svg
      # Generate the reference body once, then derive two artifacts from it:
      #   static/llms.txt           — clean markdown for LLMs/agents (llmstxt.org),
      #                                copied to the site root verbatim by Hugo.
      #   content/reference/_index.md — the same body with Hugo front matter, served
      #                                at /reference.
      # The llms.txt opens with an H1 + blockquote summary per the llms.txt spec.
      - |
        {
          echo '# CircleCI CLI'
          echo
          echo '> Command-line interface to CircleCI for use in your terminal or scripts. This is the full command reference, generated from the live command tree.'
          echo
          go run ./cmd/circleci help getting-started
          echo
          go run ./cmd/circleci help environment
          echo
          go run ./cmd/circleci help formatting
          echo
          go run ./cmd/circleci help reference
        } > {{.SITE_DIR}}/static/llms.txt
      - |
        {
          echo '---'
          echo 'title: CircleCI CLI Reference'
          echo '---'
          echo
          go run ./cmd/circleci help getting-started
          echo
          go run ./cmd/circleci help environment
          echo
          go run ./cmd/circleci help formatting
          echo
          go run ./cmd/circleci help reference
        } > {{.SITE_DIR}}/content/reference/_index.md

  docs:clean:
    desc: Remove the built docs site
    cmds:
      - rm -rf {{.SITE_OUT}}

  docs:build:
    desc: Generate the reference and build the static site
    deps:
      - docs:clean
      - docs:reference
    cmds:
      - 'go tool -modfile tools/go.mod hugo --source {{.SITE_DIR}} --minify --gc'

  docs:server:
    desc: Serve the docs site locally with live reload
    deps:
      - docs:reference
    cmds:
      - 'go tool -modfile tools/go.mod hugo server --source {{.SITE_DIR}} {{.CLI_ARGS}}'

  docs:test:
    desc: Validate the built site's internal links with htmltest
    cmds:
      - 'go tool -modfile tools/go.mod htmltest -c {{.SITE_DIR}}/.htmltest.yml {{.CLI_ARGS}}'

  docs:hugo:
    desc: Run the pinned Hugo binary with arbitrary arguments
    cmds:
      - 'go tool -modfile tools/go.mod hugo --source {{.SITE_DIR}} {{.CLI_ARGS}}'

  ci:docs:publish:
    desc: Publish the built site to the gh-pages branch (CI only)
    vars:
      BRANCH: gh-pages
      WORKTREE: .gh-pages
      MESSAGE: 'Deploy docs from {{env "CIRCLE_SHA1" | default "local"}}'
    cmds:
      - test -d {{.SITE_OUT}} || { echo "Run 'task docs:build' first."; exit 1; }
      # Only set the deploy-bot identity in CI; never clobber a local git config.
      - |
        if [ -n "${CI:-}" ]; then
          git config --global user.email '{{.GH_EMAIL}}'
          git config --global user.name '{{.GH_NAME}}'
        fi
      - rm -rf {{.WORKTREE}}
      - git worktree prune
      - |
        git fetch origin {{.BRANCH}} || true
        if git rev-parse --verify --quiet refs/remotes/origin/{{.BRANCH}}; then
          git worktree add -B {{.BRANCH}} {{.WORKTREE}} origin/{{.BRANCH}}
        else
          git worktree add --orphan -b {{.BRANCH}} {{.WORKTREE}}
        fi
      # Replace the branch's contents wholesale so deletions propagate, then copy
      # in the freshly built site (the .git pointer file must survive).
      - find {{.WORKTREE}} -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
      - cp -R {{.SITE_OUT}}/. {{.WORKTREE}}/
      - |
        git -C {{.WORKTREE}} add -A
        git -C {{.WORKTREE}} commit -m '{{.MESSAGE}}' || { echo "No changes to publish."; }
        git -C {{.WORKTREE}} push origin {{.BRANCH}}
      - git worktree remove --force {{.WORKTREE}}

  # CI tasks

  ci:lint:
    desc: Lint with JUnit output
    cmds:
      - mkdir -p "{{.RESULTS_DIR}}"
      - task: lint
        vars:
          CLI_ARGS: |
            ./... \
            --output.junit-xml.path "{{.LINT_REPORT}}" --output.junit-xml.extended \
            --output.text.path=stdout --output.text.colors=true

  ci:test:
    desc: Run tests with JUnit output
    vars:
      ARGS: '{{default "./..." .CLI_ARGS}}'
      RACE: '{{if not (eq OS "windows")}}-race{{end}}'
    cmds:
      - mkdir -p {{.RESULTS_DIR}}
      - go tool -modfile tools/go.mod gotestsum --junitfile="{{.TEST_REPORT}}" -- {{.RACE}} -count=1 {{.ARGS}}

  ci:check:
    desc: Check no uncommitted diffs after generate/fmt/tidy
    cmds:
      - task: ci:lint
      - task: license
        vars:
          CLI_ARGS: -check .
      - task: mod-tidy
        vars:
          CLI_ARGS: -diff
      - task: release-check
      - task: generate
      - git diff --exit-code

  ci:release:
    desc: Tag, build, and publish a release
    vars:
      VERSION: 'v1.0.{{env "CIRCLE_BUILD_NUM" | default "0"}}-pre'
    cmds:
      # Only set the deploy-bot identity in CI; never clobber a local git config.
      - |
        if [ -n "${CI:-}" ]; then
          git config --global user.email '{{.GH_EMAIL}}'
          git config --global user.name '{{.GH_NAME}}'
        fi
      - git tag -a '{{.VERSION}}' -m 'Release {{.VERSION}}'
      - git push origin '{{.VERSION}}'
      - go tool -modfile tools/go.mod goreleaser release --clean
      - task: ci:packagecloud
      - task: ci:cloudsmith

  ci:packagecloud:
    desc: Publish the Linux nfpm packages (rpm + deb) from dist/ to packagecloud
    # PACKAGECLOUD_TOKEN must be set in the environment (not needed when DRY_RUN is
    # set). Override REPO to target a different packagecloud repository
    # (<user>/<repo>); set DRY_RUN to validate without uploading.
    vars:
      REPO: '{{default "circleci/circleci" .REPO}}'
      DRY_RUN: '{{default "" .DRY_RUN}}'
    cmds:
      # goreleaser only pushes to packagecloud under a Pro licence, so cmd/packagecloud
      # uploads the nfpm output to the public REST API instead — no Ruby CLI needed.
      - go run ./cmd/packagecloud pkg push {{if .DRY_RUN}}--dry-run {{end}}--repo '{{.REPO}}' dist/*.rpm dist/*.deb

  ci:cloudsmith:
    desc: Publish the Linux nfpm packages (deb + rpm) from dist/ to Cloudsmith
    # CLOUDSMITH_API_KEY must be set in the environment (not needed when DRY_RUN is
    # set). Override CLOUDSMITH_REPO to target a different Cloudsmith repository
    # (<owner>/<repo>); set DRY_RUN to validate without uploading.
    vars:
      CLOUDSMITH_REPO: '{{default "circleci-deps/public" .CLOUDSMITH_REPO}}'
      DRY_RUN: '{{default "" .DRY_RUN}}'
    cmds:
      # goreleaser can't push to Cloudsmith without a Pro licence, so cmd/cloudsmith
      # uploads the nfpm output to the public REST API instead. Every package is
      # published to the generic "any-distro/any-version" distribution.
      - go run ./cmd/cloudsmith push deb {{if .DRY_RUN}}--dry-run {{end}}--repo '{{.CLOUDSMITH_REPO}}' dist/*.deb
      - go run ./cmd/cloudsmith push rpm {{if .DRY_RUN}}--dry-run {{end}}--repo '{{.CLOUDSMITH_REPO}}' dist/*.rpm

  ci:build:
    desc: Dry-run a release — build a snapshot (incl. nfpms) and dry-run the packagecloud publish
    vars:
      VERSION: 'v1.0.{{env "CIRCLE_BUILD_NUM" | default "0"}}-pre'
    cmds:
      # Only set the deploy-bot identity in CI; never clobber a local git config.
      - |
        if [ -n "${CI:-}" ]; then
          git config --global user.email '{{.GH_EMAIL}}'
          git config --global user.name '{{.GH_NAME}}'
        fi
      - git tag -a '{{.VERSION}}' -m 'Release {{.VERSION}}'
      - go tool -modfile tools/go.mod goreleaser release --snapshot --skip=snapcraft --skip=chocolatey --clean
      - task: ci:packagecloud
        vars:
          DRY_RUN: "true"
      - task: ci:cloudsmith
        vars:
          DRY_RUN: "true"
