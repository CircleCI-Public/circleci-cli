version: 2.1

orbs:
  go: circleci/go@3.0.4

commands:
  setup:
    steps:
      - checkout
      - run: task mod-download

  store_results:
    steps:
      - store_test_results:
          path: ./test-reports

executors:
  default:
    docker:
      - image: cimg/go:1.26
    resource_class: large

jobs:
  lint:
    executor: default
    steps:
      - setup
      - go/with-cache:
          golangci-lint: true
          steps:
            - run: task ci:lint
            - store_results
            - run: task ci:diff

  test:
    executor: default
    steps:
      - setup
      - go/with-cache:
          steps:
            - run: task ci:test
            - store_results

workflows:
  ci:
    jobs:
      - lint
      - test
