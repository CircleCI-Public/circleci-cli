version: 2.1

x_values:
  checksum: &checksum '{{ checksum "go.sum" }}_{{ checksum "tools/go.sum" }}'

parameters:
  go_version_with_patch:
    type: string
    default: 1.26.2

orbs:
  go: circleci/go@3.0.4

commands:
  setup:
    steps:
      - checkout
      - install-go
      - install-task

  install-go:
    # TODO: Fix the Go orb install command, so it supports Windows.
    steps:
      - run:
          name: Install Go
          command: |
            arch="$(uname -m)"
            case $arch in
              "x86_64")
                ARCH=amd64
                ;;
              "aarch64")
                ARCH=arm64
                ;;
              "arm64")
                ARCH=arm64
                ;;
              *)
                echo "Unknown architecture: $arch"
                exit 1
                ;;
            esac
            echo "Detected architecture: $ARCH"
            
            os="$(uname -o)"
            case "$os" in
              "Darwin")
                OS=darwin
                ;;
              "Msys")
                OS=windows
                ;;
              "GNU/Linux")
                OS=linux
                ;;
              *)
                echo "Unknown OS: $os"
                exit 1
                ;;
            esac
            echo "Detected OS: $OS"
            
            EXTENSION="tar.gz"
            if [[ "$OS" == "windows" ]]; then
              EXTENSION="zip"
            fi
            URL="https://golang.org/dl/go<< pipeline.parameters.go_version_with_patch >>.${OS}-${ARCH}.${EXTENSION}"
            echo "Downloading Go from $URL"
            
            if [[ "$OS" == "windows" ]]; then
              rm -rf /c/go
              curl -o /tmp/go.zip -fsSL "$URL" 
              unzip -q -d /c/ /tmp/go.zip
            else
              echo 'export PATH="/usr/local/go/bin:$HOME/go/bin:$PATH"' >> "$BASH_ENV"
              . "$BASH_ENV"
              sudo rm -rf /usr/local/go
              curl -fsSL "$URL" | sudo tar -C /usr/local -xz
            fi
            
            go version

  install-task:
    steps:
      - run:
          name: Install go-task
          command: |
            sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b "$HOME/.local/bin"
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"

  store_results:
    steps:
      - store_test_results:
          path: ./test-reports

executors:
  linux:
    docker:
      - image: cimg/base:stable
    resource_class: large.gen2

  linux_machine:
    machine: true
    resource_class: large.gen2

  macos:
    macos:
      xcode: 26.5.0
    environment:
      # Work around Go orb not knowing where the cache is on MacOS (assuming ~/.cache/go-build).
      GOCACHE: '/Users/distiller/.cache/go-build'

  windows:
    machine: true
    resource_class: windows.medium
    environment:
      # Work around Go orb not knowing where the cache is on Windows (assuming ~/.cache/go-build).
      GOCACHE: 'C:\Users\circleci\.cache\go-build'

jobs:
  check:
    executor: linux
    steps:
      - setup
      - go/with-cache:
          checksum: *checksum
          golangci-lint: true
          steps:
            - run: task ci:check
            - store_results

  test:
    parameters:
      executor:
        type: executor
    executor: << parameters.executor >>
    steps:
      - setup
      - go/with-cache:
          checksum: *checksum
          steps:
            - run: task ci:test
            - store_results

  mark-release:
    executor: linux
    steps:
      - run:
          name: Plan deployment
          command: |
            circleci run release plan "${CIRCLE_JOB}" \
              --environment-name="default" \
              --component-name="${CIRCLE_PROJECT_REPONAME}" \
              --target-version="1.0.${CIRCLE_BUILD_NUM}-${CIRCLE_SHA1:0:7}"
      - run:
          name: Update deployment status to running
          command: circleci run release update "${CIRCLE_JOB}" --status=RUNNING
      - run:
          name: Update deployment status to success
          command: circleci run release update "${CIRCLE_JOB}" --status=SUCCESS
          when: on_success
      - run:
          name: Update deployment status to failed
          command: circleci run release update "${CIRCLE_JOB}" --status=FAILED
          when: on_fail

  deploy:
    executor: linux_machine
    parameters:
      publish_steps:
        type: steps
        default:
          - run: task ci:release
    steps:
      - setup
      - run:
          name: Install snapcraft
          command: |
            sudo apt update --yes
            sudo apt install snapd  --yes
            sudo snap install snapcraft --classic
      - run:
          name: Configure snapcraft
          # Credentials are read from the SNAPCRAFT_LOGIN_FILE env var (base64-encoded).
          # To refresh: run `snapcraft login` and `snapcraft export-login creds`
          # inside cibuilds/snapcraft:stable, then `cat creds | base64 | tr -d '\n'`
          # and store the output as SNAPCRAFT_LOGIN_FILE in CircleCI project settings.
          command: |
            mkdir -p .snapcraft
            echo -n "$SNAPCRAFT_LOGIN_FILE" | base64 --decode > .snapcraft/snapcraft.cfg
      - run:
          name: Install choco
          command: |
            sudo cp tools/choco.sh /usr/local/bin/choco
            sudo chmod +x /usr/local/bin/choco
            choco help
      - go/with-cache:
          checksum: *checksum
          steps: << parameters.publish_steps >>
      - store_artifacts:
          path: dist

  docs:
    executor: linux
    steps:
      - setup
      - run:
          name: Install docs toolchain (Hugo + htmltest)
          command: task docs:install
      - run:
          name: Generate reference and build the site
          command: task docs:build
      - run:
          name: Check internal links
          command: task docs:test
      - store_artifacts:
          path: website/public

  docs-publish:
    executor: linux
    steps:
      - setup
      - run:
          name: Install docs toolchain (Hugo + htmltest)
          command: task docs:install
      - run:
          name: Generate reference and build the site
          command: task docs:build
      - run:
          name: Publish to gh-pages
          command: task ci:docs:publish

  ok-to-deploy:
    type: no-op

workflows:
  ci:
    jobs:

      # gh-pages holds only generated HTML — never run CI on it. Entry jobs (no
      # `requires`) must opt out explicitly; downstream jobs are gated by these.

      - check:
          filters:
            branches:
              ignore: gh-pages

      - test:
          matrix:
            parameters:
              executor:
                - linux
                - macos
                - windows
          filters:
            branches:
              ignore: gh-pages

      - docs:
          filters:
            branches:
              ignore: gh-pages

      - deploy:
          name: dry-run
          publish_steps:
            - run: task ci:build
          filters:
            branches:
              ignore:
                - main
                - gh-pages

      - ok-to-deploy:
          requires:
            - check
            - test
            - docs
          filters:
            branches:
              only: main

      - mark-release:
          requires:
            - ok-to-deploy

      - deploy:
          requires:
            - ok-to-deploy
          context:
            - devex-release
            - macos-codesigning

      - docs-publish:
          requires:
            - ok-to-deploy
          context:
            - devex-release
