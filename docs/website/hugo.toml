# Published to GitHub Pages under the repo subpath. Keep the trailing slash so
# relative asset URLs resolve correctly.
baseURL = "https://circleci-public.github.io/circleci-cli/"
languageCode = "en-us"
title = "CircleCI CLI"

# Landing page (/) + the reference section (/reference); no taxonomy/term/RSS/404.
disableKinds = ["taxonomy", "term", "RSS", "404"]

# The reference page is generated markdown and contains rendered HTML tables;
# allow raw HTML through Goldmark.
[markup.goldmark.renderer]
  unsafe = true

# Add anchor links to headings so command sections are deep-linkable.
[markup.goldmark.parser]
  autoHeadingID = true
  autoHeadingIDType = "github"

[markup.tableOfContents]
  startLevel = 2
  endLevel = 3

# Emit CSS classes for code highlighting instead of inline styles, so the code
# blocks can be themed from main.css (see the .highlight rules there) rather
# than carrying Chroma's hardcoded colors.
[markup.highlight]
  noClasses = false
  guessSyntax = false
  tabWidth = 2

# Single page for now — only emit HTML for the home page.
[outputs]
  home = ["HTML"]
