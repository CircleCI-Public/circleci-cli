version: 2

project_name: circleci-cli

before:
  hooks:
    # Generate the man page and shell completions from the cobra command tree
    # (no compiled binary needed), into a UNIX-style share/ layout for packaging.
    # --output creates any missing parent directories.
    - go run ./cmd/circleci man --output share/man/man1/circleci.1
    - go run ./cmd/circleci completion bash --output share/bash-completion/completions/circleci
    - go run ./cmd/circleci completion zsh --output share/zsh/site-functions/_circleci

builds:
  - binary: circleci
    main: ./cmd/circleci
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

nfpms:
  - package_name: circleci
    license: MIT
    maintainer: CircleCI
    homepage: https://github.com/CircleCI-Public/circleci-cli
    description: CircleCI command line tool.
    recommends:
      - bash-completion
    contents:
      - src: ./share/man/man1/circleci.1
        dst: /usr/share/man/man1/circleci.1
        file_info:
          mode: 0644
      - src: "./share/bash-completion/completions/circleci"
        dst: "/usr/share/bash-completion/completions/circleci"
      - src: "./share/zsh/site-functions/_circleci"
        dst: "/usr/share/zsh/site-functions/_circleci"
      - src: "./share/zsh/site-functions/_circleci"
        dst: "/usr/share/zsh/vendor-completions/_circleci"
        packager: deb
    formats:
      - deb
      - rpm

notarize:
  macos:
    - enabled: '{{ isEnvSet "QUILL_SIGN_P12" }}'
      sign:
        certificate: '{{ envOrDefault "QUILL_SIGN_P12" ""}}'
      notarize:
        issuer_id: '{{ envOrDefault "QUILL_NOTARY_ISSUER" ""}}'
        key_id: '{{ envOrDefault "QUILL_NOTARY_KEY_ID" ""}}'
        key: '{{ envOrDefault "QUILL_NOTARY_KEY" ""}}'

chocolateys:
  - package_source_url: https://github.com/CircleCI-Public/circleci-cli
    owners: CircleCI
    title: CircleCI CLI
    authors: CircleCI
    project_url: https://github.com/CircleCI-Public/circleci-cli
    icon_url: "https://github.com/CircleCI-Public/circleci-cli/raw/main/chocolatey/icons/circleci-128x.png"
    copyright: 2026 CircleCI Inc
    license_url: https://raw.githubusercontent.com/CircleCI-Public/circleci-cli/master/LICENSE
    require_license_acceptance: false
    project_source_url: https://github.com/CircleCI-Public/circleci-cli
    docs_url: https://cli.circleci.com/reference/
    bug_tracker_url: https://github.com/CircleCI-Public/circleci-cli/issues
    tags: "ci"
    summary: CircleCI command line tool
    description: |
      Command line tool for performing tasks related to a CircleCI project. Enables
      you to run local builds, debug your continuous integration config files, and
      manage Orbs.
    api_key: "{{ .Env.CHOCO_API_KEY }}"
    skip_publish: true # TODO: Remove this once we're ready to release

winget:
  - publisher: CircleCI
    name: CircleCI CLI
    short_description: "CircleCI command line tool."
    description: |
      Command line tool for performing tasks related to a CircleCI project. Enables
      you to run local builds, debug your continuous integration config files, and
      manage Orbs.
    license: "MIT"
    license_url: "https://github.com/CircleCI-Public/circleci-cli/blob/HEAD/LICENSE"
    tags:
      - circle-ci
      - circleci
      - cli
      - command-line-tool
      - continuous-delivery
      - continuous-integration
      - developer-tools
      - devops
      - golang
      - graphql
      - tool
    publisher_url: "https://github.com/CircleCI-Public"
    publisher_support_url: "https://github.com/CircleCI-Public/circleci-cli/issues/new"
    package_identifier: CircleCI.CLI
    url_template: "https://github.com/CircleCI-Public/circleci-cli/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    homepage: "https://circleci.com"
    copyright: "Circle Internet Services, Inc."
    # TODO: Remove this once we're ready to release'
    skip_upload: true
    release_notes: "{{.Changelog}}"
    release_notes_url: "https://github.com/CircleCI-Public/circleci-cli/releases/tag/{{ .Tag }}"
    repository:
      owner: CircleCI-Public
      name: winget-pkgs
      branch: "circleci-cli-{{ .Tag }}"
      pull_request:
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
  - publisher: CircleCI
    name: CircleCI CLI Preview
    short_description: "CircleCI command line tool."
    description: |
      Command line tool for performing tasks related to a CircleCI project. Enables
      you to run local builds, debug your continuous integration config files, and
      manage Orbs.
      
      Secure token storage requires connecting the password-manager interface:
      `sudo snap connect circleci:password-manager-service`. Without it, the token
      falls back to the config file.
    license: "MIT"
    license_url: "https://github.com/CircleCI-Public/circleci-cli/blob/HEAD/LICENSE"
    tags:
      - circle-ci
      - circleci
      - cli
      - command-line-tool
      - continuous-delivery
      - continuous-integration
      - developer-tools
      - devops
      - golang
      - graphql
      - tool
    publisher_url: "https://github.com/CircleCI-Public"
    publisher_support_url: "https://github.com/CircleCI-Public/circleci-cli/issues/new"
    package_identifier: CircleCI.CLI.Preview
    url_template: "https://github.com/CircleCI-Public/circleci-cli/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    homepage: "https://circleci.com"
    copyright: "Circle Internet Services, Inc."
    release_notes: "{{.Changelog}}"
    release_notes_url: "https://github.com/CircleCI-Public/circleci-cli/releases/tag/{{ .Tag }}"
    repository:
      owner: CircleCI-Public
      name: winget-pkgs
      branch: "circleci-cli-next-{{ .Tag }}"
      pull_request:
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

# To refresh the snapcraft credentials, run:
# $ snapcraft export-login --snaps circleci --channels stable,candidate,edge,beta --acls package_push,package_release snapcraft-credentials.txt
# Then paste the contents of snapcraft-credentials.txt into:
# $ circleci context secret set devex-release --name SNAPCRAFT_STORE_CREDENTIALS
snapcrafts:
  - id: circleci
    name: circleci
    title: CircleCI CLI
    summary: CircleCI command line tool
    description: |
      Command line tool for performing tasks related to a CircleCI project. Enables
      you to run local builds, debug your continuous integration config files, and
      manage Orbs.

      Secure token storage requires connecting the password-manager interface:
      `sudo snap connect circleci:password-manager-service`. Without it, the token
      falls back to the config file.
    license: MIT
    grade: devel # TODO: Change to stable once we're ready to release
    confinement: strict
    publish: true
    # devel-grade snaps can only be released to edge/beta, never
    # candidate/stable. Pin the channels until grade becomes stable.
    channel_templates:
      - edge
      - beta
    apps:
      circleci:
        plugs:
          - home
          - network
          - password-manager-service
        command: circleci

homebrew_casks:
  - name: circleci@next
    directory: Casks
    repository:
      owner: CircleCI-Public
      name: homebrew-circleci
      branch: main
    homepage: "https://circleci.com"
    description: "CircleCI command line tool."
    binaries:
      - circleci
    manpages:
      - share/man/man1/circleci.1
    completions:
      bash: share/bash-completion/completions/circleci
      zsh: share/zsh/site-functions/_circleci
    caveats: |
      This preview build installs a `circleci` binary that conflicts with the
      stable `circleci` formula from homebrew-core. Homebrew cannot declare a
      cask/formula conflict automatically, so if you have the core formula
      installed, unlink it first to avoid a clashing symlink:

        brew unlink circleci

archives:
  - files:
      - LICENSE
      - src: ./share/man/man1/circleci.1
        dst: share/man/man1/circleci.1
      - src: ./share/bash-completion/completions/circleci
        dst: share/bash-completion/completions/circleci
      - src: ./share/zsh/site-functions/_circleci
        dst: share/zsh/site-functions/_circleci
    format_overrides:
      - goos: windows
        formats:
          - zip

release:
  prerelease: auto
  name_template: "CircleCI CLI {{.Version}}"
  make_latest: false
  header: |
    **⚠️ Preview release — not recommended for production use.**
    
    This is a preview of the next-generation CircleCI CLI (v1.0 rewrite).
    It is published from the `next` branch for early testing and feedback.
    For the production-ready CLI, install the latest stable release from:
    - [Homebrew](https://formulae.brew.sh/formula/circleci);
    - Snap;
    - Chocolatey;
    - or the [install script](https://github.com/CircleCI-Public/circleci-cli#install-script).
