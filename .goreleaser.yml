version: 2

project_name: circleci-cli

builds:
  - binary: circleci
    main: ./cmd/circleci
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

nfpms:
  - license: MIT
    maintainer: CircleCI
    homepage: https://github.com/CircleCI-Public/circleci-cli
    bindir: /usr
    dependencies:
      - git
    description: CircleCI command line tool.
    formats:
      - deb
      - rpm

notarize:
  macos:
    - enabled: '{{ isEnvSet "QUILL_SIGN_P12" }}'
      sign:
        certificate: '{{ envOrDefault "QUILL_SIGN_P12" ""}}'
      notarize:
        issuer_id: '{{ envOrDefault "QUILL_NOTARY_ISSUER" ""}}'
        key_id: '{{ envOrDefault "QUILL_NOTARY_KEY_ID" ""}}'
        key: '{{ envOrDefault "QUILL_NOTARY_KEY" ""}}'

chocolateys:
  - package_source_url: https://github.com/CircleCI-Public/circleci-cli
    owners: CircleCI
    title: CircleCI CLI
    authors: CircleCI
    project_url: https://github.com/CircleCI-Public/circleci-cli
    icon_url: "https://github.com/CircleCI-Public/circleci-cli/raw/main/chocolatey/icons/circleci-128x.png"
    copyright: 2026 CircleCI Inc
    license_url: https://raw.githubusercontent.com/CircleCI-Public/circleci-cli/master/LICENSE
    require_license_acceptance: false
    project_source_url: https://github.com/CircleCI-Public/circleci-cli
    docs_url: https://circleci-public.github.io/circleci-cli
    bug_tracker_url: https://github.com/CircleCI-Public/circleci-cli/issues
    tags: "ci"
    summary: CircleCI command line tool
    description: |
      Command line tool for performing tasks related to a CircleCI project. Enables
      you to run local builds, debug your continuous integration config files, and
      manage Orbs.
    api_key: "{{ .Env.CHOCO_API_KEY }}"
    skip_publish: true # TODO: Remove this once we're ready to release

winget:
  - publisher: CircleCI
    short_description: "CircleCI command line tool."
    description: |
      Command line tool for performing tasks related to a CircleCI project. Enables
      you to run local builds, debug your continuous integration config files, and
      manage Orbs.
    license: "MIT"
    license_url: "https://github.com/CircleCI-Public/circleci-cli/blob/HEAD/LICENSE"
    tags:
      - circle-ci
      - circleci
      - cli
      - command-line-tool
      - continuous-delivery
      - continuous-integration
      - developer-tools
      - devops
      - golang
      - graphql
      - tool
    publisher_url: "https://github.com/CircleCI-Public"
    publisher_support_url: "https://github.com/CircleCI-Public/circleci-cli/issues/new"
    package_identifier: CircleCI.CLI
    url_template: "https://github.com/CircleCI-Public/circleci-cli/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    homepage: "https://circleci.com"
    copyright: "Circle Internet Services, Inc."
    # TODO: Remove this once we're ready to release'
    skip_upload: true
    release_notes: "{{.Changelog}}"
    release_notes_url: "https://github.com/CircleCI-Public/circleci-cli/releases/tag/{{ .Tag }}"
    repository:
      owner: CircleCI-Public
      name: winget-pkgs
      branch: "circleci-cli"
      pull_request:
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

snapcrafts:
  - id: circleci
    name: circleci
    title: CircleCI CLI
    summary: CircleCI command line tool
    description: |
      Command line tool for performing tasks related to a CircleCI project. Enables
      you to run local builds, debug your continuous integration config files, and
      manage Orbs.
    license: MIT
    grade: devel # TODO: Change to stable once we're ready to release
    confinement: strict
    apps:
      circleci:
        plugs:
          - docker
          - home
          - network
        command: circleci

homebrew_casks:
  - name: circleci@next
    directory: Casks
    repository:
      owner: CircleCI-Public
      name: homebrew-circleci
      branch: main
    homepage: "https://circleci.com"
    description: "CircleCI command line tool."
    binaries:
      - circleci
    generate_completions_from_executable:
      executable: circleci
      shell_parameter_format: cobra
      shells:
        - bash
        - zsh
    caveats: |
      This preview build installs a `circleci` binary that conflicts with the
      stable `circleci` formula from homebrew-core. Homebrew cannot declare a
      cask/formula conflict automatically, so if you have the core formula
      installed, unlink it first to avoid a clashing symlink:

        brew unlink circleci
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/circleci"]
          end

archives:
  - wrap_in_directory: true
    format_overrides:
      - goos: windows
        formats:
          - zip

release:
  prerelease: auto
  name_template: "CircleCI CLI {{.Version}}"
  make_latest: false
  header: |
    **⚠️ Preview release — not recommended for production use.**
    
    This is a preview of the next-generation CircleCI CLI (v1.0 rewrite).
    It is published from the `next` branch for early testing and feedback.
    For the production-ready CLI, install the latest stable release from:
    - [Homebrew](https://formulae.brew.sh/formula/circleci);
    - Snap;
    - Chocolatey;
    - or the [install script](https://github.com/CircleCI-Public/circleci-cli#install-script).
