project_name: circleci-cli

builds:
  - binary: circleci
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - wrap_in_directory: true
    format_overrides:
      - goos: windows
        format: zip

release:
  prerelease: auto
  make_latest: false
